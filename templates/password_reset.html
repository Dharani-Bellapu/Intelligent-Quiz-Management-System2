{% extends 'base.html' %}
{% block title %}Password Reset{% endblock %}
{% block content %}
<div class="container mt-5 " style="max-width: 480px; background: rgba(32,38,58,0.9); padding: 24px; border-radius: 12px;">
  <h3 class="mb-3 text-primary" style="background: linear-gradient(90deg, #6C63FF, #00C9FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
    Reset your password
  </h3>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary btn-glow mt-3" style="width: 100%; background: linear-gradient(90deg, #6C63FF, #00C9FF); border:none;">
      Send Reset Link
    </button>
  </form>
</div>
{% endblock %}
