{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="container mt-5 text-center" style="max-width: 480px; background: rgba(32,38,58,0.9); padding: 24px; border-radius: 12px;">
  <h3 class="mb-3 text-primary" style="background: linear-gradient(90deg, #6C63FF, #00C9FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
    Password Reset Successful
  </h3>
  <p>Your password has been reset successfully. You may now <a href="{% url 'login' %}" style="color:#6C63FF;">log in</a>.</p>
</div>
{% endblock %}
