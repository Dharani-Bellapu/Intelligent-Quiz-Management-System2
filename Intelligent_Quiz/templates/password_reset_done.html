{% extends 'base.html' %}
{% block title %}Password Reset Sent{% endblock %}
{% block content %}
<div class="container mt-5 text-center" style="max-width: 480px; background: rgba(32,38,58,0.9); padding: 24px; border-radius: 12px;">
  <h3 class="mb-3 text-primary" style="background: linear-gradient(90deg, #6C63FF, #00C9FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
    Check Your Email
  </h3>
  <p>If an account exists with that email, a password reset link has been sent.</p>
  <a class="btn btn-primary btn-glow mt-3" href="{% url 'login' %}" style="background: linear-gradient(90deg, #6C63FF, #00C9FF); border:none;">
    Back to Login
  </a>
</div>
{% endblock %}
