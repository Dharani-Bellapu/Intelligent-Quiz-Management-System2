{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:70vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4" style="background:rgba(32,38,58,0.97);box-shadow:0 0 25px #6c63ff22;">
            <div class="card-body p-4">
                <h3 class="text-center mb-4" style="background:linear-gradient(90deg,#6C63FF,#00C9FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Welcome Back</h3>
                <form method="POST" autocomplete="off">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe" name="remember">
                        <label class="form-check-label" for="rememberMe">Remember Me</label>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-glow" style="background:linear-gradient(90deg,#6C63FF,#00C9FF);border:none;">Login</button>
                    </div>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'password_reset' %}" style="color:#8eaaff;">Forgot Password?</a>
                </div>
                <p class="mt-3 text-center" style="color:#cfcfcf;">Don't have an account? <a href="{% url 'register' %}" style="color:#6C63FF;">Sign Up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
